<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Servicios | BarberFlow</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="services">
<div data-header></div>
<main>
  <section class="page-hero"><p class="eyebrow">Servicios</p><h1>Cortes y cuidado masculino con agenda confirmada</h1><p>Elige uno o varios servicios y reserva según duración real.</p></section>
  <section class="section" data-services>
    <div class="filter-pills" data-service-filters>
      <button class="pill active" type="button" data-filter="todos">Todos</button>
      <button class="pill" type="button" data-filter="corte">Cortes</button>
      <button class="pill" type="button" data-filter="combo">Combos</button>
      <button class="pill" type="button" data-filter="barba">Barba</button>
      <button class="pill" type="button" data-filter="cejas">Cejas</button>
      <button class="pill" type="button" data-filter="facial">Facial</button>
      <button class="pill" type="button" data-filter="manos">Manos</button>
      <button class="pill" type="button" data-filter="cabello">Cabello</button>
    </div>
    <div class="cards-grid" data-services-list><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>
  </section>
</main>
<div data-footer></div><div class="toast" data-toast></div><script src="js/app.js"></script>
</body>
</html>
